name: Build debug APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sync-calendar-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish latest debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "Debug build (авто, обновляется каждым пушем)"
          body: "Последняя debug-сборка. Всегда одна и та же ссылка — старая версия при новом пуше заменяется."
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
